    <style>
        /* ========== ESTILOS GLOBAIS (mesmos da versão anterior) ========== */
        .chart-container {
            position: relative;
            width: 100%;
            height: clamp(300px, 50vh, 500px);
            min-height: 300px;
            max-height: 500px;
        }
        .chart-container-lg {
            height: auto;
            min-height: 400px;
        }
        @media (max-width: 640px) {
            .chart-container { height: 280px; min-height: 280px; }
            .chart-container-lg { min-height: 380px; }
        }
        @media (min-width: 641px) and (max-width: 1024px) {
            .chart-container { height: 350px; min-height: 350px; }
            .chart-container-lg { min-height: 420px; }
        }
        @media (min-width: 1025px) {
            .chart-container-lg { min-height: 480px; }
        }
        .glass {
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .table-container {
            max-height: 500px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        @media (max-width: 768px) {
            .table-container { max-height: 400px; }
        }
        .month-btn {
            min-height: 48px;
            font-size: 0.7rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            transition: all 0.3s ease;
        }
        .month-btn.active {
            background: linear-gradient(135deg, #10B981, #059669);
            color: white;
            border-color: #A7F3D0;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
            transform: scale(1.02);
        }
        .month-btn:hover:not(.active):not(:disabled) {
            background: rgba(100, 116, 139, 0.3);
            border-color: rgba(255, 255, 255, 0.2);
        }
        @media (min-width: 768px) {
            .month-btn { min-height: 52px; font-size: 0.75rem; }
        }
        @media (min-width: 1024px) {
            .month-btn { min-height: 56px; font-size: 0.8rem; }
        }
        .year-select-btn {
            background: rgba(30, 41, 59, 0.9);
            border: 2px solid #10b981;
            color: #10b981;
            padding: 0.5rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: bold;
            font-family: 'ui-monospace', monospace;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 100px;
            text-align: center;
            appearance: none;
            position: relative;
            padding-right: 2.5rem;
        }
        .year-select-btn:hover {
            background: #10b981;
            color: white;
            border-color: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }
        .year-select-btn:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.3);
        }
        .btn-anual {
            background: rgba(30, 41, 59, 0.9);
            border: 2px solid #eab308;
            color: #fef08a;
            padding: 0.75rem 2rem;
            border-radius: 0.75rem;
            font-weight: bold;
            font-family: 'ui-monospace', monospace;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn-anual:hover {
            background: #eab308;
            color: white;
            border-color: #fef08a;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.4);
        }
        .btn-anual.active {
            background: linear-gradient(135deg, #ca8a04, #eab308);
            color: white;
            border-color: #fef08a;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.4);
        }
        .year-select-wrapper {
            position: relative;
            display: inline-block;
        }
        .year-select-wrapper::after {
            content: "▼";
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #10b981;
            font-size: 0.8rem;
            pointer-events: none;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(30, 41, 59, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(100, 116, 139, 0.7); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.9); }
        
        .pelotao-gradient-0 { background-color: #065f46; }
        .pelotao-gradient-1 { background-color: #047857; }
        .pelotao-gradient-2 { background-color: #059669; }
        .pelotao-gradient-3 { background-color: #10b981; }
        .pelotao-gradient-4 { background-color: #34d399; }
        .pelotao-gradient-5 { background-color: #6ee7b7; }
        .pelotao-gradient-6 { background-color: #a7f3d0; }
        .pelotao-gradient-7 { background-color: #d1fae5; }
        
        /* Mapa */
        .map-wrapper { position: relative; width: 100%; }
        .map-container {
            height: 500px;
            width: 100%;
            border-radius: 0.75rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .map-container.map-landscape { height: 500px; max-width: 100%; }
        .map-container.map-portrait { height: 720px; max-width: 540px; margin: 0 auto; }
        .map-wrapper:fullscreen {
            width: 100vw;
            height: 100vh;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .map-wrapper:fullscreen .map-container.map-landscape { height: 92vh; width: 96vw; max-width: 96vw; border-radius: 1rem; }
        .map-wrapper:fullscreen .map-container.map-portrait { height: 92vh; width: auto; max-width: calc(92vh * 0.75); border-radius: 1rem; }
        @media (max-width: 768px) {
            .map-container.map-landscape { height: 400px; }
            .map-container.map-portrait { height: 600px; max-width: 100%; }
        }
        .custom-popup .leaflet-popup-content-wrapper {
            background: rgba(30, 41, 59, 0.95);
            color: #e2e8f0;
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: 'ui-monospace', monospace;
        }
        .custom-popup .leaflet-popup-tip { background: rgba(30, 41, 59, 0.95); }
        .leaflet-container { background: #1e293b; }
        
        .map-action-btn {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'ui-monospace', monospace;
        }
        .map-action-btn:hover:not(:disabled) { background: #10b981; border-color: #10b981; }
        .map-action-btn:disabled { opacity: 0.6; cursor: wait; }
        .orientation-select {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 28px 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            appearance: none;
            font-family: 'ui-monospace', monospace;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%23ffffff'%3e%3cpath d='M4 6l4 4 4-4'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 12px;
        }
        .orientation-select:hover { border-color: #10b981; }
        .map-toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .export-xlsx-btn {
            background: linear-gradient(135deg, #059669, #10b981);
            border: 1px solid #34d399;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .export-xlsx-btn:hover:not(:disabled) { background: linear-gradient(135deg, #10b981, #34d399); box-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
    </style>

</head>
